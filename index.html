<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostile Volume</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex items-center justify-center overflow-hidden font-sans select-none">

    <audio id="bg-music" loop>
        <source src="elevator.mp3" type="audio/mpeg">
    </audio>

    <div id="instructions-modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl max-w-md text-center border border-gray-700">
            <h1 class="text-3xl font-bold mb-4 text-gray-100">Hostile Volume</h1>
            <p class="text-gray-400 mb-8 text-lg leading-relaxed">
                To progress to the next level, set the volume to exactly <strong class="text-white bg-gray-700 px-2 py-1 rounded">25%</strong> and hold it there for 3 seconds.
            </p>
            <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-lg transition-colors w-full">
                Got it!
            </button>
        </div>
    </div>

    <div id="level-container" class="hidden w-full max-w-md p-10 bg-gray-800 rounded-2xl shadow-2xl text-center border border-gray-700 transition-all duration-500">
        <h2 id="level-title" class="text-sm tracking-widest uppercase font-semibold mb-10 text-gray-500">Level 1</h2>
        
        <div id="level-1" class="level-ui hidden">
            <input type="range" min="0" max="100" value="75" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-blue-500" id="l1-slider">
            <div class="mt-8 text-4xl font-mono text-gray-300" id="l1-display">75%</div>
        </div>

        <div id="level-2" class="level-ui hidden flex flex-col items-center gap-6">
            <button id="l2-up" class="p-4 bg-gray-700 hover:bg-gray-600 active:bg-gray-500 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
            </button>
            <div class="text-4xl font-mono text-gray-300 w-24" id="l2-display">75%</div>
            <button id="l2-down" class="p-4 bg-gray-700 hover:bg-gray-600 active:bg-gray-500 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
            </button>
        </div>

        <div id="level-3" class="level-ui hidden flex flex-col items-center justify-center min-h-[300px]">
            <button id="l3-up" class="p-4 bg-gray-700 hover:bg-gray-600 active:bg-gray-500 rounded-full transition-transform duration-75 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
            </button>
            <div class="text-4xl font-mono text-gray-300 w-24 my-6" id="l3-display">75%</div>
            <button id="l3-down" class="p-4 bg-gray-700 hover:bg-gray-600 active:bg-gray-500 rounded-full transition-transform duration-75 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const modal = document.getElementById('instructions-modal');
        const startBtn = document.getElementById('start-btn');
        const levelContainer = document.getElementById('level-container');
        const levelTitle = document.getElementById('level-title');

        let currentVolume = 75;
        let progressTimer = null;
        let currentLevelIndex = 0;

        // Centralized Volume Manager
        function setVolume(val) {
            // Clamp volume between 0 and 100
            currentVolume = Math.max(0, Math.min(100, val));
            
            // Set actual audio volume (0.0 to 1.0)
            audio.volume = currentVolume / 100;

            // Update the UI for the current level
            levels[currentLevelIndex].updateUI(currentVolume);

            // Level Progression Logic
            if (currentVolume === 25) {
                if (!progressTimer) {
                    progressTimer = setTimeout(() => {
                        nextLevel();
                    }, 3000); // 3 seconds at 25%
                }
            } else {
                // If they move off 25%, cancel the timer
                if (progressTimer) {
                    clearTimeout(progressTimer);
                    progressTimer = null;
                }
            }
        }

        // Level Registry - ADD NEW LEVELS HERE
        const levels = [
            {
                id: 'level-1',
                init: () => {
                    const slider = document.getElementById('l1-slider');
                    slider.addEventListener('input', (e) => setVolume(parseInt(e.target.value)));
                },
                updateUI: (vol) => {
                    document.getElementById('l1-slider').value = vol;
                    document.getElementById('l1-display').innerText = vol + '%';
                }
            },
            {
                id: 'level-2',
                init: () => {
                    document.getElementById('l2-up').onclick = () => setVolume(currentVolume + 1);
                    document.getElementById('l2-down').onclick = () => setVolume(currentVolume - 1);
                },
                updateUI: (vol) => {
                    document.getElementById('l2-display').innerText = vol + '%';
                }
            },
            {
                id: 'level-3',
                distance: 0,
                init: function() {
                    const upBtn = document.getElementById('l3-up');
                    const downBtn = document.getElementById('l3-down');
                    
                    const moveButtons = () => {
                        this.distance += 1; // Move 1px per click
                        upBtn.style.transform = `translateY(-${this.distance}px)`;
                        downBtn.style.transform = `translateY(${this.distance}px)`;
                    };

                    upBtn.onclick = () => {
                        setVolume(currentVolume + 1);
                        moveButtons();
                    };
                    downBtn.onclick = () => {
                        setVolume(currentVolume - 1);
                        moveButtons();
                    };
                },
                updateUI: (vol) => {
                    document.getElementById('l3-display').innerText = vol + '%';
                },
                reset: function() {
                    this.distance = 0;
                    document.getElementById('l3-up').style.transform = `translateY(0px)`;
                    document.getElementById('l3-down').style.transform = `translateY(0px)`;
                }
            }
        ];
        ];

        function loadLevel(index) {
            // Hide all levels first
            document.querySelectorAll('.level-ui').forEach(el => el.classList.add('hidden'));
            
            if (index >= levels.length) {
                levelTitle.innerText = "More suffering coming soon...";
                return;
            }

            // Show current level
            const level = levels[index];
            if (level.reset) level.reset();
            
            document.getElementById(level.id).classList.remove('hidden');
            levelTitle.innerText = `Level ${index + 1}`;
            
            // Fade effect for smooth transition
            levelContainer.classList.remove('opacity-100');
            levelContainer.classList.add('opacity-0');
            
            setTimeout(() => {
                setVolume(75); // Reset to 75%
                levelContainer.classList.remove('opacity-0');
                levelContainer.classList.add('opacity-100');
            }, 300);
        }

        function nextLevel() {
            progressTimer = null; 
            currentLevelIndex++;
            loadLevel(currentLevelIndex);
        }

        // Initialize elements
        levels.forEach(level => level.init());

        // Start App
        startBtn.addEventListener('click', () => {
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                levelContainer.classList.remove('hidden');
                
                // Play music at 75%
                audio.volume = 0.75;
                audio.play().catch(e => console.log("Please add an elevator.mp3 file to the directory."));
                
                loadLevel(0);
            }, 300);
        });
    </script>
</body>
</html>
